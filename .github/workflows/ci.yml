# CI Pipeline — runs unit tests and ElasticDash AI tests on PRs to master and pushes to master.
# See CICD.md for full documentation.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Remove local-only dependencies
        run: node -e "const p=require('./package.json'); delete p.dependencies['elasticdash-test']; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  elasticdash-ci:
    name: ElasticDash AI Tests
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install elasticdash-test
        run: npm install -g elasticdash-test

      - name: Debug — verify secrets are set
        run: |
          echo "ELASTICDASH_API_URL is set: ${{ secrets.ELASTICDASH_API_URL != '' }}"
          echo "ELASTICDASH_API_KEY is set: ${{ secrets.ELASTICDASH_API_KEY != '' }}"
          echo "ELASTICDASH_API_URL length: ${#ELASTICDASH_API_URL}"
          echo "ELASTICDASH_API_KEY length: ${#ELASTICDASH_API_KEY}"
          echo "ELASTICDASH_API_URL prefix: ${ELASTICDASH_API_URL:0:10}..."
          echo "ELASTICDASH_API_KEY prefix: ${ELASTICDASH_API_KEY:0:5}..."
        env:
          ELASTICDASH_API_URL: ${{ secrets.ELASTICDASH_API_URL }}
          ELASTICDASH_API_KEY: ${{ secrets.ELASTICDASH_API_KEY }}

      - name: Run ElasticDash CI tests
        run: elasticdash ci
        env:
          ELASTICDASH_API_URL: ${{ secrets.ELASTICDASH_API_URL }}
          ELASTICDASH_API_KEY: ${{ secrets.ELASTICDASH_API_KEY }}
          # Add API keys for every AI provider your tests use.
          # Missing keys cause tests targeting that provider to fail.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
